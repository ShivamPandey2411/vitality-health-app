<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Anushka | Anti-Gravity</title>
    <!-- Modern stylish font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a1c4fd;
            --secondary: #c2e9fb;
            --text-dark: #2d3748;
            --text-light: #4a5568;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            /* Moving beautiful dark gradient for contrast */
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            perspective: 1000px;
            /* For 3D floating effects */
        }

        /* Breath-taking background shift */
        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 2. The Anti-Gravity Animation */
        @keyframes drift {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            33% {
                transform: translateY(-20px) rotate(2deg);
            }

            66% {
                transform: translateY(10px) rotate(-1deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* Ambient glowing orbs to make the background feel alive */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: drift 10s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(161, 196, 253, 0.4);
            top: -50px;
            left: -50px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(255, 182, 193, 0.3);
            /* Soft pink */
            bottom: -100px;
            right: -50px;
            animation-delay: -5s;
        }

        /* 3. The "Floating Glass" Card - Premium UI */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: drift 6s ease-in-out infinite;
            max-width: 420px;
            width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Card interaction */
        .glass-card:hover {
            animation: none;
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            margin: 0 0 15px 0;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Premium Button Style */
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            color: #2c5364;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Shimmer effect on button */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            color: #0f2027;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Tiny floating stars for extra magic */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 1;
            animation: twinkle infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>

    <!-- Ambient background glowing orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Randomly generated stars for a magical feel -->
    <script>
        for (let i = 0; i < 60; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            star.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(star);
        }
    </script>

    <div class="glass-card">
        <h1>Anushka</h1>
        <p>In a world pulled down by gravity, you are the one who keeps me floating. You're simply out of this world.
        </p>
        <a href="#" class="btn">Our Memories</a>
    </div>

</body>

</html>
